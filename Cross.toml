[target.armv7-unknown-linux-gnueabihf]
dockerfile = ".github/cross-images/armv7-unknown-linux-gnueabihf-system-sqlite/Dockerfile"

[target.aarch64-unknown-linux-musl]
dockerfile = ".github/cross-images/aarch64-unknown-linux-musl-system-sqlite/Dockerfile"

[target.x86_64-unknown-linux-musl]
dockerfile = ".github/cross-images/x86_64-unknown-linux-musl-system-sqlite/Dockerfile"

[build.env]
passthrough = [
  "PKG_CONFIG_ALLOW_CROSS",
  "PKG_CONFIG_PATH",
  "PKG_CONFIG_LIBDIR",
  "SQLITE3_INCLUDE_DIR",
  "SQLITE3_LIB_DIR",
]
