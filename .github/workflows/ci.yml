---
name: CI

'on':
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  hooks:
    name: Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify pre-commit hook is executable
        run: test -x .githooks/pre-commit

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          components: clippy
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  msrv:
    name: MSRV Check (1.88.0)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - run: cargo check --workspace --locked

  no-std:
    name: No-Std Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - run: |
          cargo check \
            --no-default-features \
            --features sqlite-bundled \
            --locked

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - run: cargo test --verbose --locked

  system-sqlite-host:
    name: System SQLite Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Install system SQLite deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsqlite3-dev pkg-config
      - name: Setup vcpkg SQLite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VcpkgCommit = "62159a45e18f3a9ac0548628dcaf74fcb60c6ff9"
          git clone https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP/vcpkg"
          git -C "$env:RUNNER_TEMP/vcpkg" checkout $VcpkgCommit
          & "$env:RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat"
          & "$env:RUNNER_TEMP/vcpkg/vcpkg.exe" install sqlite3:x64-windows
          "VCPKG_ROOT=$env:RUNNER_TEMP/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Test against system SQLite
        run: cargo test --verbose --no-default-features --locked

  linux-arm64-gnu-system-sqlite:
    name: Linux ARM64 GNU System SQLite Test
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Install system SQLite deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsqlite3-dev pkg-config
      - name: Verify host architecture
        run: rustc -vV
      - name: Test against system SQLite
        run: cargo test --verbose --no-default-features --locked

  ios:
    name: iOS Test
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Build check (bundled SQLite)
        run: |
          cargo check \
            --target aarch64-apple-ios \
            --no-default-features \
            --features sqlite-bundled \
            --locked
      - name: Build check (system SQLite)
        run: |
          cargo check \
            --target aarch64-apple-ios \
            --no-default-features \
            --locked
      - name: Boot iOS simulator
        run: |
          RUNTIME_JSON="$(xcrun simctl list runtimes --json \
            | jq -c '.runtimes
              | map(select(.isAvailable == true))
              | map(select(.name | contains("iOS")))
              | .[-1]')"
          RUNTIME_ID="$(echo "$RUNTIME_JSON" | jq -r '.identifier')"
          DEVICE_TYPE_ID="$(echo "$RUNTIME_JSON" \
            | jq -r '.supportedDeviceTypes
              | map(select(.productFamily == "iPhone"))
              | .[0].identifier')"

          if [ -z "$RUNTIME_ID" ] || [ "$RUNTIME_ID" = "null" ]; then
            echo "No available iOS simulator runtime found"
            exit 1
          fi
          if [ -z "$DEVICE_TYPE_ID" ] || [ "$DEVICE_TYPE_ID" = "null" ]; then
            echo "No available iPhone simulator device type found"
            exit 1
          fi

          SIM_UDID="$(xcrun simctl create ci-rust-ios \
            "$DEVICE_TYPE_ID" "$RUNTIME_ID")"
          echo "SIMULATOR_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          echo "Selected runtime: $RUNTIME_ID"
          echo "Selected device type: $DEVICE_TYPE_ID"
          echo "Created simulator: $SIM_UDID"

          xcrun simctl boot "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b
      - name: Run iOS simulator tests (bundled SQLite)
        run: |
          cargo test \
            --target aarch64-apple-ios-sim \
            --no-default-features \
            --features sqlite-bundled \
            --locked
        env:
          CARGO_TARGET_AARCH64_APPLE_IOS_SIM_RUNNER: >-
            xcrun simctl spawn ${{ env.SIMULATOR_UDID }}
      - name: Run iOS simulator tests (system SQLite)
        run: |
          cargo test \
            --target aarch64-apple-ios-sim \
            --no-default-features \
            --locked
        env:
          CARGO_TARGET_AARCH64_APPLE_IOS_SIM_RUNNER: >-
            xcrun simctl spawn ${{ env.SIMULATOR_UDID }}
      - name: Cleanup iOS simulator
        if: always()
        run: |
          if [ -n "${SIMULATOR_UDID:-}" ]; then
            xcrun simctl shutdown "$SIMULATOR_UDID" || true
            xcrun simctl delete "$SIMULATOR_UDID" || true
          fi

  android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
        with:
          ndk-version: r27c
      - name: Android build checks (bundled + system)
        run: |
          # Strict-first policy: keep this system-SQLite check required.
          # If Android system sqlite is not CI-feasible, switch to explicit
          # documented N/A in a follow-up change with rationale.
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt"
          TOOLCHAIN="$TOOLCHAIN/linux-x86_64/bin"
          CLANG="$TOOLCHAIN/aarch64-linux-android21-clang"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CLANG"
          export CC_aarch64_linux_android="$CLANG"
          export AR_aarch64_linux_android="$TOOLCHAIN/llvm-ar"

          cargo check \
            --target aarch64-linux-android \
            --no-default-features \
            --features sqlite-bundled \
            --locked

          cargo check \
            --target aarch64-linux-android \
            --no-default-features \
            --locked
        env:
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}

  android-test:
    name: Android Test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Setup Android NDK
        id: setup-ndk-test
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
        with:
          ndk-version: r27c
      - name: Android test link checks (bundled + system)
        run: |
          # Strict-first policy: keep this system-SQLite link check required.
          # If Android system sqlite is not CI-feasible, switch to explicit
          # documented N/A in a follow-up change with rationale.
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt"
          TOOLCHAIN="$TOOLCHAIN/linux-x86_64/bin"
          CLANG="$TOOLCHAIN/aarch64-linux-android21-clang"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CLANG"
          export CC_aarch64_linux_android="$CLANG"
          export AR_aarch64_linux_android="$TOOLCHAIN/llvm-ar"

          cargo test \
            --target aarch64-linux-android \
            --no-run \
            --no-default-features \
            --features sqlite-bundled \
            --locked

          cargo test \
            --target aarch64-linux-android \
            --no-run \
            --no-default-features \
            --locked
        env:
          NDK_PATH: ${{ steps.setup-ndk-test.outputs.ndk-path }}

  edge-system-sqlite-build:
    name: Edge System SQLite Check (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        target:
          - armv7-unknown-linux-gnueabihf
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Build check against system SQLite
        run: |
          cargo check \
            --target "${{ matrix.target }}" \
            --no-default-features \
            --locked

  windows-arm64-system-sqlite:
    name: Windows ARM64 System SQLite Link Check
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          targets: aarch64-pc-windows-msvc
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Setup vcpkg SQLite ARM64
        shell: pwsh
        run: |
          $VcpkgCommit = "62159a45e18f3a9ac0548628dcaf74fcb60c6ff9"
          git clone https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP/vcpkg"
          git -C "$env:RUNNER_TEMP/vcpkg" checkout $VcpkgCommit
          & "$env:RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat"
          & "$env:RUNNER_TEMP/vcpkg/vcpkg.exe" install sqlite3:arm64-windows
          "VCPKG_ROOT=$env:RUNNER_TEMP/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKGRS_TRIPLET=arm64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Link check against system SQLite
        shell: pwsh
        run: cargo test --target aarch64-pc-windows-msvc --no-run --no-default-features --locked

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - run: cargo doc --no-deps --all-features --locked

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@da0c226a0505be3ce471c69c66beedda2420dce9
      - name: Generate coverage
        run: |
          cargo llvm-cov \
            --all-features \
            --locked \
            --lcov \
            --output-path lcov.info
      - name: Upload coverage
        if: ${{ secrets.CODECOV_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
