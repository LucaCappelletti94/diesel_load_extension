---
name: CI

'on':
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  hooks:
    name: Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify pre-commit hook is executable
        run: test -x .githooks/pre-commit

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  msrv:
    name: MSRV Check (1.88.0)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked

  no-std:
    name: No-Std Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo check \
            --no-default-features \
            --features sqlite-bundled \
            --locked

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --verbose --locked

  ios:
    name: iOS Test
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo check \
            --target aarch64-apple-ios \
            --no-default-features \
            --features sqlite-bundled \
            --locked
      - name: Boot iOS simulator
        run: |
          RUNTIME_JSON="$(xcrun simctl list runtimes --json \
            | jq -c '.runtimes
              | map(select(.isAvailable == true))
              | map(select(.name | contains("iOS")))
              | .[-1]')"
          RUNTIME_ID="$(echo "$RUNTIME_JSON" | jq -r '.identifier')"
          DEVICE_TYPE_ID="$(echo "$RUNTIME_JSON" \
            | jq -r '.supportedDeviceTypes
              | map(select(.productFamily == "iPhone"))
              | .[0].identifier')"

          if [ -z "$RUNTIME_ID" ] || [ "$RUNTIME_ID" = "null" ]; then
            echo "No available iOS simulator runtime found"
            exit 1
          fi
          if [ -z "$DEVICE_TYPE_ID" ] || [ "$DEVICE_TYPE_ID" = "null" ]; then
            echo "No available iPhone simulator device type found"
            exit 1
          fi

          SIM_UDID="$(xcrun simctl create ci-rust-ios \
            "$DEVICE_TYPE_ID" "$RUNTIME_ID")"
          echo "SIMULATOR_UDID=$SIM_UDID" >> "$GITHUB_ENV"
          echo "Selected runtime: $RUNTIME_ID"
          echo "Selected device type: $DEVICE_TYPE_ID"
          echo "Created simulator: $SIM_UDID"

          xcrun simctl boot "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b
      - name: Run iOS simulator tests
        run: |
          cargo test \
            --target aarch64-apple-ios-sim \
            --no-default-features \
            --features sqlite-bundled \
            --locked
        env:
          CARGO_TARGET_AARCH64_APPLE_IOS_SIM_RUNNER: >-
            xcrun simctl spawn ${{ env.SIMULATOR_UDID }}
      - name: Cleanup iOS simulator
        if: always()
        run: |
          if [ -n "${SIMULATOR_UDID:-}" ]; then
            xcrun simctl shutdown "$SIMULATOR_UDID" || true
            xcrun simctl delete "$SIMULATOR_UDID" || true
          fi

  android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
      - run: |
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt"
          TOOLCHAIN="$TOOLCHAIN/linux-x86_64/bin"
          CLANG="$TOOLCHAIN/aarch64-linux-android21-clang"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CLANG"
          export CC_aarch64_linux_android="$CLANG"
          export AR_aarch64_linux_android="$TOOLCHAIN/llvm-ar"
          cargo check \
            --target aarch64-linux-android \
            --no-default-features \
            --features sqlite-bundled \
            --locked
        env:
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}

  android-test:
    name: Android Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Setup Android NDK
        id: setup-ndk-test
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
      - run: |
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt"
          TOOLCHAIN="$TOOLCHAIN/linux-x86_64/bin"
          CLANG="$TOOLCHAIN/aarch64-linux-android21-clang"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CLANG"
          export CC_aarch64_linux_android="$CLANG"
          export AR_aarch64_linux_android="$TOOLCHAIN/llvm-ar"
          cargo test \
            --target aarch64-linux-android \
            --no-run \
            --no-default-features \
            --features sqlite-bundled \
            --locked
        env:
          NDK_PATH: ${{ steps.setup-ndk-test.outputs.ndk-path }}

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features --locked

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: |
          cargo llvm-cov \
            --all-features \
            --locked \
            --lcov \
            --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
